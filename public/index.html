<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlanningPoker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .card-gradient { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
        .perspective-1000 { perspective: 1000px; }
        .card-inner { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; position: relative; width: 100%; height: 100%; }
        .card-revealed { transform: rotateY(180deg); }
        .card-face { backface-visibility: hidden; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; border-radius: 0.75rem; }
        .card-back { transform: rotateY(180deg); }
        
        @keyframes floatUp { 
            0% { transform: translateY(0) scale(0.5); opacity: 0; } 
            20% { opacity: 1; transform: translateY(-20px) scale(1.2); }
            100% { transform: translateY(-350px) scale(1.8); opacity: 0; } 
        }
        .emote-fly { position: fixed; bottom: 120px; pointer-events: none; animation: floatUp 2.5s cubic-bezier(0.22, 1, 0.36, 1) forwards; font-size: 3.5rem; z-index: 1000; }

        .emote-throw {
            position: fixed;
            pointer-events: none;
            z-index: 2000;
            font-size: 1.6rem;
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen" x-data="pokerApp()" x-init="init()">

    <div x-cloak>
        <template x-for="e in activeEmotes" :key="e.id">
            <div class="emote-fly" :style="`left: ${e.x}%`" x-text="e.icon"></div>
        </template>

        <template x-for="t in thrownEmotes" :key="t.id">
            <div class="emote-throw" 
                 :id="'throw-'+t.id"
                 :style="`left: ${t.startX}px; top: ${t.startY}px; transform: scale(0.3); opacity: 0;`"
                 x-init="$nextTick(() => animateThrow(t))"
                 x-text="t.icon"></div>
        </template>

        <div x-show="showOverlay" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-950/98 backdrop-blur-md p-4">
            <div class="bg-slate-900 border border-slate-700 p-8 rounded-3xl shadow-2xl max-w-md w-full border-t-4 border-t-indigo-500 text-center">
                <h2 class="text-2xl font-black mb-6 uppercase tracking-tight text-white">PlanningPoker Pro</h2>
                
                <div class="relative w-24 h-24 mx-auto mb-6 group cursor-pointer" @click="changeAvatar()">
                    <img :src="`https://api.dicebear.com/7.x/avataaars/svg?seed=${avatarSeed}`" 
                         class="w-full h-full rounded-full bg-slate-800 border-2 border-slate-700 group-hover:border-indigo-500 transition-all shadow-lg">
                    <div class="absolute -top-1 -right-1 bg-yellow-400 text-slate-900 text-[10px] font-black px-1.5 py-0.5 rounded-full shadow-md animate-bounce">
                        NEW
                    </div>
                </div>

                <div class="space-y-4">
                    <input type="text" x-model="userName" @input="errorMessage = ''" @keyup.enter="confirmJoin()" placeholder="Enter your nickname" 
                           class="w-full bg-slate-800 border rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-500 text-center text-white font-bold transition-all"
                           :class="errorMessage ? 'border-red-500 ring-1 ring-red-500' : 'border-slate-700'">
                    
                    <p x-show="errorMessage" x-text="errorMessage" class="text-red-400 text-xs font-bold uppercase tracking-widest animate-pulse"></p>

                    <button @click="confirmJoin()" :disabled="!userName" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 rounded-2xl font-black disabled:opacity-50 uppercase tracking-widest transition-all">Join Session</button>
                </div>
            </div>
        </div>

        <div x-show="!showOverlay" class="flex flex-col min-h-screen">
            <header class="p-4 border-b border-slate-800 glass sticky top-0 z-50 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="bg-indigo-600 p-2 rounded-lg font-black text-xl shadow-lg">🃏</div>
                    <div>
                        <h1 class="text-lg font-black leading-none uppercase tracking-tighter text-white">PlanningPoker Pro</h1>
                        <span class="text-[10px] text-slate-500 font-mono font-bold tracking-widest uppercase" x-text="roomId"></span>
                    </div>
                </div>
                
                <div class="flex-1 max-w-md px-4 text-center">
                    <template x-if="isCreator">
                        <div class="flex flex-col gap-2">
                            <input type="text" x-model="storyTitle" @input="broadcastTitle()" placeholder="Enter User Story..." class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-2 text-center font-bold text-indigo-300 outline-none focus:border-indigo-500 transition-colors">
                            <div class="flex justify-center gap-2">
                                <template x-for="d in Object.keys(decks)" :key="d">
                                    <button @click="currentDeck = d" x-text="d" 
                                            :class="currentDeck === d ? 'text-indigo-400 bg-indigo-500/10 border-indigo-500/50' : 'text-slate-500 bg-slate-800 border-slate-700'"
                                            class="text-[9px] font-black px-2 py-0.5 rounded border uppercase tracking-tighter transition-all"></button>
                                </template>
                            </div>
                        </div>
                    </template>
                    <template x-if="!isCreator">
                        <div class="py-2 px-4 bg-slate-800/30 rounded-xl font-bold text-indigo-200 truncate" x-text="storyTitle || 'Waiting for User Story...'"></div>
                    </template>
                </div>

                <div class="flex items-center gap-4 relative" x-data="{ open: false }">
                    <div class="text-right hidden md:block">
                        <p class="text-xs font-black text-white leading-none" x-text="userName"></p>
                        <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mt-1" x-text="isCreator ? 'Session Creator' : 'Member'"></p>
                    </div>
                    <img @click="open = !open" :src="`https://api.dicebear.com/7.x/avataaars/svg?seed=${avatarSeed}`" class="w-10 h-10 rounded-full border border-slate-700 hover:border-indigo-500 transition-all shadow-lg cursor-pointer bg-slate-800">
                    
                    <div x-show="open" @click.away="open = false" class="absolute right-0 top-12 w-48 bg-slate-900 border border-slate-800 rounded-xl shadow-2xl py-2 z-[60]">
                        <button @click="changeAvatar(); open = false" class="w-full text-left px-4 py-2 text-xs font-bold hover:bg-slate-800 transition-colors flex items-center gap-2 text-slate-300">
                            <span>🔄</span> Change Avatar
                        </button>
                        <button @click="logout()" class="w-full text-left px-4 py-2 text-xs font-bold hover:bg-slate-800 transition-colors flex items-center gap-2 text-red-400 border-t border-slate-800 mt-1">
                            <span>🚪</span> Exit Session
                        </button>
                    </div>

                    <button @click="copyLink()" 
                            :class="linkCopied ? 'bg-emerald-600 border-emerald-400' : 'bg-slate-800 border-slate-700 hover:bg-slate-700'"
                            class="p-2 rounded-lg border transition-all duration-300" title="Copy Room Link">
                        <span x-text="linkCopied ? '✅' : '🔗'"></span>
                    </button>
                </div>
            </header>

            <main class="max-w-6xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-8 w-full pb-32">
                <div class="lg:col-span-2 space-y-8">
                    <div class="bg-slate-900/60 p-6 rounded-3xl border border-slate-800 grid grid-cols-4 md:grid-cols-8 gap-3">
                        <template x-for="val in decks[currentDeck]" :key="'card-'+val">
                            <button @click="castVote(val)" 
                                class="h-20 rounded-2xl bg-slate-800 border-2 border-transparent hover:border-indigo-500 font-black text-xl transition-all active:scale-95 shadow-lg" 
                                :class="myVote === val ? 'bg-indigo-900/40 border-indigo-500 text-indigo-400' : 'text-slate-400'" 
                                x-text="val"></button>
                        </template>
                    </div>

                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
                        <template x-for="p in (players || [])" :key="p.id">
                            <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 flex flex-col items-center relative transition-all shadow-xl hover:border-slate-700">
                                
                                <div class="absolute top-1 right-1 z-10" 
                                     x-data="{ showRadial: false }" 
                                     @mouseenter="if(p.id !== socketId) showRadial = true" 
                                     @mouseleave="showRadial = false">
                                    
                                    <img :id="'avatar-'+p.id"
                                         :src="`https://api.dicebear.com/7.x/avataaars/svg?seed=${p.avatar}`" 
                                         class="w-8 h-8 rounded-full border border-slate-700 bg-slate-800 shadow-lg transition-transform"
                                         :class="p.id !== socketId ? 'cursor-crosshair hover:scale-125' : ''">

                                    <div x-show="showRadial" 
                                         class="absolute top-8 -right-2 flex flex-col gap-2 bg-slate-800 border border-slate-700 p-2 rounded-xl shadow-2xl animate-in fade-in zoom-in duration-150 z-20">
                                        <template x-for="icon in ['🍅','💩','❤️', lastSelectedEmote]" :key="icon">
                                            <button @click="triggerThrow(p.id, icon)" class="hover:scale-150 transition-transform p-1 text-xl active:scale-90" x-text="icon"></button>
                                        </template>
                                    </div>
                                </div>
                                
                                <div class="w-16 h-24 perspective-1000 mb-3 mt-2">
                                    <div class="card-inner" :class="revealed ? 'card-revealed' : ''">
                                        <div class="card-face w-full h-full border-2" :class="p.voted ? 'border-emerald-500 bg-slate-800 shadow-[0_0_15px_rgba(16,185,129,0.1)]' : 'border-slate-800 bg-slate-800/20 border-dashed'">
                                            <span x-show="p.voted" class="text-2xl">🔒</span>
                                        </div>
                                        <div class="card-face card-back w-full h-full card-gradient font-black text-2xl shadow-2xl text-white" x-text="p.vote"></div>
                                    </div>
                                </div>
                                <span class="text-xs font-black uppercase text-slate-400 truncate w-full text-center tracking-tight" x-text="p.name"></span>
                            </div>
                        </template>
                    </div>
                </div>

                <div class="space-y-6">
                    <div class="bg-slate-900 p-8 rounded-3xl border border-slate-800 shadow-2xl h-fit sticky top-24">
                        <template x-if="isCreator">
                            <div class="flex items-center justify-between mb-6 bg-slate-950/50 p-3 rounded-xl border border-slate-800">
                                <span class="text-[10px] font-black uppercase text-slate-500 tracking-wider">Auto-Reveal</span>
                                <button @click="autoReveal = !autoReveal" 
                                        :class="autoReveal ? 'bg-indigo-600 border-indigo-400' : 'bg-slate-800 border-slate-700'"
                                        class="w-10 h-5 rounded-full border transition-all relative">
                                    <div :class="autoReveal ? 'translate-x-5' : 'translate-x-1'" class="absolute top-1 w-3 h-3 bg-white rounded-full transition-transform"></div>
                                </button>
                            </div>
                        </template>

                        <h2 class="text-sm font-black mb-8 uppercase text-center text-slate-500 italic tracking-[0.2em]">Session Analytics</h2>
                        
                        <div class="flex flex-col items-center justify-center py-6 mb-8 bg-slate-800/20 rounded-3xl border border-slate-800/50 min-h-[160px]">
                            <div x-show="!revealed" class="text-center">
                                <div x-show="countdown > 0" class="animate-bounce">
                                    <p class="text-[10px] font-black uppercase text-indigo-400 mb-1">Revealing in...</p>
                                    <div class="text-6xl font-black text-white" x-text="countdown"></div>
                                </div>
                                <div x-show="countdown <= 0">
                                    <p class="text-[10px] font-black uppercase text-slate-500 mb-2 animate-pulse">Voting In Progress</p>
                                </div>
                            </div>
                            <div x-show="revealed" class="text-center animate-in zoom-in duration-500">
                                <p class="text-[10px] font-black uppercase text-indigo-400 mb-1">Most Voted Value</p>
                                <div class="text-7xl font-black text-white drop-shadow-[0_0_20px_rgba(99,102,241,0.5)]" x-text="stats.mostVoted"></div>
                            </div>
                        </div>

                        <div class="mb-8">
                            <div class="flex justify-between text-[10px] font-black uppercase text-slate-400 mb-2">
                                <span>Progress</span>
                                <span x-text="votedCount + ' / ' + (players || []).length"></span>
                            </div>
                            <div class="w-full bg-slate-950 rounded-full h-2.5 overflow-hidden border border-slate-800">
                                <div class="bg-indigo-500 h-full transition-all duration-700 ease-out" :style="'width:' + (players.length ? (votedCount/players.length*100) : 0) + '%'"></div>
                            </div>
                        </div>

                        <div x-show="revealed" class="space-y-4 border-t border-slate-800 pt-6">
                            <div class="flex justify-between font-black uppercase text-xs"><span>Average Score</span><span class="text-indigo-400" x-text="stats.average"></span></div>
                            <div class="flex justify-between font-black uppercase text-xs"><span>Consensus</span><span class="text-purple-400" x-text="stats.consensus + '%'"></span></div>
                            
                            <div class="mt-6 space-y-2">
                                <p class="text-[10px] font-black uppercase text-slate-500 mb-3 tracking-widest text-left">Distribution</p>
                                <template x-for="item in voteDistribution" :key="'dist-'+item.val">
                                    <div class="flex items-center justify-between text-[11px] font-bold py-1">
                                        <span class="bg-slate-800 px-2 py-0.5 rounded border border-slate-700" x-text="item.val"></span>
                                        <span class="text-slate-400" x-text="item.count + (item.count === 1 ? ' vote' : ' votes')"></span>
                                    </div>
                                </template>
                            </div>
                        </div>

                        <div class="mt-8 space-y-4">
                            <button x-show="!revealed" @click="revealVotes()" :disabled="votedCount === 0" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-20 rounded-xl font-black transition-all shadow-lg shadow-indigo-900/40 uppercase tracking-widest text-sm text-white">REVEAL CARDS</button>
                            <button x-show="revealed" @click="resetTable()" class="w-full py-4 bg-slate-700 hover:bg-slate-600 rounded-xl font-black uppercase tracking-widest text-sm transition-colors text-white">NEXT STORY</button>
                        </div>
                    </div>
                </div>
            </main>

            <footer class="fixed bottom-6 left-1/2 -translate-x-1/2 glass border border-slate-700 rounded-2xl px-6 py-3 z-50 flex gap-6 shadow-2xl">
                <template x-for="emo in ['🔥','👏','🚀','🤔','😱','✈️','🗑️','🍺','🍕','🎉','💯','💡','💎']" :key="'btn-'+emo">
                    <button @click="sendEmote(emo)" class="text-2xl hover:scale-150 transition-transform active:scale-90" x-text="emo"></button>
                </template>
            </footer>
        </div>
    </div>

    <script>
        function pokerApp() {
            const socket = io();
            return {
                showOverlay: true, isCreator: false, roomId: '', socketId: '',
                userName: localStorage.getItem('p_name') || '',
                avatarSeed: localStorage.getItem('p_avatar') || Math.random().toString(36).substring(7),
                storyTitle: '', myVote: null, revealed: false, players: [], currentDeck: 'Fibonacci', 
                activeEmotes: [], thrownEmotes: [], lastSelectedEmote: '🚀', errorMessage: '', linkCopied: false,
                decks: { 
                    'Fibonacci': [1,2,3,5,8,13,21,34,'?'],
                    'Standard': [1,2,3,4,5,10,20,50,100],
                    'T-Shirt': ['XS','S','M','L','XL','XXL','?'],
                    'Animals': ['🐭','🐹','🐰','🦊','🐻','🐯','🦁','🐘'],
                    'Weather': ['☀️','🌤️','☁️','🌧️','⛈️','❄️','🌪️','🔥']
                },
                autoReveal: false, countdown: 0, timerId: null,

                init() {
                    const r = new URLSearchParams(window.location.search).get('room');
                    this.isCreator = !r;
                    this.roomId = r || 'ROOM-' + Math.random().toString(36).substring(2,7).toUpperCase();
                    
                    socket.on('connect', () => { this.socketId = socket.id; });

                    socket.on('update-state', (s) => {
                        this.players = s.players || [];
                        this.revealed = s.revealed;
                        if (this.players.some(p => p.id === this.socketId)) {
                            this.showOverlay = false;
                            this.errorMessage = '';
                        }
                        if (!this.isCreator) this.storyTitle = s.storyTitle;
                        
                        if (this.isCreator && this.autoReveal && !this.revealed && this.votedCount === this.players.length && this.players.length > 0) {
                            this.startAutoReveal();
                        } else if (this.revealed || this.votedCount < this.players.length) {
                            this.cancelAutoReveal();
                        }

                        if (this.revealed && this.stats.consensus === 100) {
                            confetti({particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#6366f1', '#a855f7']});
                        }
                    });

                    socket.on('room-error', (type) => {
                        this.errorMessage = type === 'name_taken' ? 'NICKNAME ALREADY TAKEN' : 'ROOM ALREADY EXISTS';
                        this.showOverlay = true;
                    });

                    socket.on('auto-reveal-tick', (val) => { this.countdown = val; });
                    
                    socket.on('receive-emote', (data) => {
                        this.activeEmotes.push(data);
                        setTimeout(() => this.activeEmotes = this.activeEmotes.filter(e => e.id !== data.id), 2500);
                    });

                    socket.on('receive-throw', (data) => {
                        this.thrownEmotes.push(data);
                    });

                    setInterval(() => { if(!this.showOverlay) socket.emit('heartbeat', this.roomId); }, 5000);
                },

                triggerThrow(targetId, icon) {
                    if (targetId === this.socketId) return;
                    const side = Math.random() > 0.5;
                    const data = {
                        id: Date.now() + Math.random(),
                        targetId: targetId,
                        icon: icon,
                        startX: side ? -80 : window.innerWidth + 80,
                        startY: Math.random() * (window.innerHeight * 0.8)
                    };
                    this.thrownEmotes.push(data);
                    socket.emit('throw-emote', { roomId: this.roomId, ...data });
                },

                animateThrow(t) {
                    const el = document.getElementById('throw-' + t.id);
                    const targetEl = document.getElementById('avatar-' + t.targetId);
                    if (!el || !targetEl) return;

                    const rect = targetEl.getBoundingClientRect();
                    const targetX = rect.left + rect.width / 2 - 15;
                    const targetY = rect.top + rect.height / 2 - 15;
                    
                    requestAnimationFrame(() => {
                        el.style.opacity = '1';
                        el.style.transform = 'scale(1) rotate(360deg)';
                        el.style.left = targetX + 'px';
                        el.style.top = targetY + 'px';
                    });

                    setTimeout(() => {
                        el.style.opacity = '0';
                        el.style.transform = 'scale(1.5) rotate(720deg)';
                        setTimeout(() => {
                            this.thrownEmotes = this.thrownEmotes.filter(x => x.id !== t.id);
                        }, 400);
                    }, 800);
                },

                sendEmote(icon) { 
                    this.lastSelectedEmote = icon;
                    const id = Date.now(); 
                    const emoteData = { id, icon, x: 10 + Math.random() * 80 };
                    this.activeEmotes.push(emoteData);
                    socket.emit('send-emote', { roomId: this.roomId, ...emoteData });
                    setTimeout(() => this.activeEmotes = this.activeEmotes.filter(e => e.id !== id), 2000);
                },

                startAutoReveal() {
                    if (this.timerId) return;
                    this.countdown = 3;
                    socket.emit('broadcast-countdown', { roomId: this.roomId, val: this.countdown });
                    this.timerId = setInterval(() => {
                        this.countdown--;
                        socket.emit('broadcast-countdown', { roomId: this.roomId, val: this.countdown });
                        if (this.countdown <= 0) { 
                            this.revealVotes(); 
                            this.cancelAutoReveal(); 
                        }
                    }, 1000);
                },

                cancelAutoReveal() {
                    clearInterval(this.timerId);
                    this.timerId = null;
                    this.countdown = 0;
                    if (this.isCreator) socket.emit('broadcast-countdown', { roomId: this.roomId, val: 0 });
                },

                logout() { 
                    localStorage.removeItem('p_name'); 
                    localStorage.removeItem('p_avatar');
                    window.location.href = '/'; 
                },
                changeAvatar() { 
                    this.avatarSeed = Math.random().toString(36).substring(7); 
                    localStorage.setItem('p_avatar', this.avatarSeed);
                    if (!this.showOverlay) socket.emit('update-user', { roomId: this.roomId, user: { avatar: this.avatarSeed } });
                },
                confirmJoin() {
                    if(!this.userName) return;
                    this.errorMessage = '';
                    localStorage.setItem('p_name', this.userName);
                    localStorage.setItem('p_avatar', this.avatarSeed);
                    if (this.isCreator) window.history.replaceState({}, '', `?room=${this.roomId}`);
                    socket.emit('join-room', { roomId: this.roomId, user: { name: this.userName, avatar: this.avatarSeed }, isCreating: this.isCreator });
                },
                castVote(v) { this.myVote = v; socket.emit('cast-vote', { roomId: this.roomId, vote: v }); },
                broadcastTitle() { if(this.isCreator) socket.emit('update-title', { roomId: this.roomId, title: this.storyTitle }); },
                revealVotes() { socket.emit('reveal-votes', this.roomId); },
                resetTable() { 
                    this.myVote = null; 
                    this.cancelAutoReveal(); 
                    socket.emit('reset-table', this.roomId); 
                },
                copyLink() { 
                    navigator.clipboard.writeText(window.location.href); 
                    this.linkCopied = true;
                    setTimeout(() => this.linkCopied = false, 2000);
                },
                get votedCount() { return (this.players || []).filter(p => p.voted).length; },
                get voteDistribution() {
                    if (!this.revealed) return [];
                    const v = (this.players || []).filter(p => p.voted && p.vote !== null).map(p => p.vote);
                    const counts = {}; v.forEach(x => counts[x] = (counts[x] || 0) + 1);
                    return Object.keys(counts).map(k => ({ val: k, count: counts[k] })).sort((a,b) => b.count - a.count);
                },
                get stats() {
                    const v = (this.players || []).filter(p => p.voted && p.vote !== null).map(p => p.vote);
                    if (!v.length) return { average: 0, consensus: 0, mostVoted: '-' };
                    const nums = v.filter(n => typeof n === 'number');
                    const counts = {}; v.forEach(x => counts[x] = (counts[x] || 0) + 1);
                    const mostVoted = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
                    return { 
                        average: nums.length ? (nums.reduce((a,b)=>a+b, 0)/nums.length).toFixed(1) : '-', 
                        consensus: Math.round((Math.max(...Object.values(counts))/v.length)*100),
                        mostVoted: mostVoted
                    };
                }
            }
        }
    </script>
